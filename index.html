<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandOS — Клиентские материалы</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  .logo { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
  .logo span { color: #6366f1; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 48px; }
  .clients { display: grid; gap: 16px; }
  .client-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; text-decoration: none; color: inherit; transition: border-color 0.2s; display: block; }
  .client-card:hover { border-color: #6366f1; }
  .client-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .client-niche { font-size: 13px; color: #666; }
  .footer { margin-top: 48px; text-align: center; font-size: 12px; color: #444; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Brand<span>OS</span></div>
  <div class="subtitle">Клиентские материалы — стратегия, исследования, позиционирование</div>
  <div class="clients">
    <a href="kirill-masla/" class="client-card">
      <div class="client-name">Кирилл Бродский</div>
      <div class="client-niche">Масла первого холодного отжима · Магия Масел</div>
    </a>
    <a href="sotolab/" class="client-card">
      <div class="client-name">SotoLab</div>
      <div class="client-niche">СТМ-дистрибьютор · Дальневосточные натуральные продукты</div>
    </a>
  </div>
  <div class="footer">brandos.ru · Фабрика Контента</div>
</div>
</body>
</html>
